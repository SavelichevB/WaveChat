version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-wavechat_pass}
      MYSQL_DATABASE: wave_chat
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./Backend
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-wavechat_pass}
      DB_NAME: wave_chat
      JWT_SECRET: ${JWT_SECRET:-WaveMini}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=}
      SERVER_PORT: "3333"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend/web
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
